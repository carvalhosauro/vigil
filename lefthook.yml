# Git hooks, managed by lefthook. Install with: mix setup  (or: lefthook install)
# https://lefthook.dev

pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{ex,exs}"
      run: mix format {staged_files}
      stage_fixed: true
    credo:
      glob: "*.{ex,exs}"
      run: mix credo --strict

pre-push:
  parallel: false
  commands:
    compile:
      run: mix compile --warnings-as-errors
    test:
      run: mix test

commit-msg:
  commands:
    conventional-commit:
      # Enforce Conventional Commits on the subject line. No Node required.
      run: |
        head -n1 {1} | grep -qE '^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-z0-9_.-]+\))?!?: .+' && exit 0
        echo "✗ Commit message must follow Conventional Commits."
        echo "  e.g.  feat(core): add crossing operator evaluation"
        exit 1
